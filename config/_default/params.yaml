hugoblox:
  schema: "2.0"

  identity:
    name: "Sen He"
    organization: "University of Arizona"
    type: person
    tagline: "Assistant Professor | ECE | University of Arizona"
    description: "Sen He - Assistant Professor at the University of Arizona. Research in multi-agent LLM orchestration, software performance engineering, cloud computing, and computer vision."
    social:
      twitter: ""

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "#AB0520"    # UofA Red
      secondary: "#0C234B"  # UofA Navy Blue
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    pack: "academic"

  layout:
    radius: "md"
    spacing: "comfortable"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} Sen He"
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: "Sen He | University of Arizona"
    location:
      address:
        street: ""
        city: "Tucson"
        region: "AZ"
        postal_code: ""
        country: "US"
      coordinates:
        latitude: 32.2319
        longitude: -110.9501
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: ""
      contact: "senhe@arizona.edu"

  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: ieee

  search:
    enable: true
    suggestions: []
    quick_actions: []

  comments:
    enable: false
    provider: ""

  analytics:
    google:
      measurement_id: ""

  verification:
    google: ""

  repository:
    enable: true
    url: "https://github.com/sen-he/sen-he.github.io"
    branch: main
    content_dir: content

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  privacy:
    enable: false
    anonymize_analytics: true

  debug:
    enable: false

  pro:
    hide_attribution: false
    affiliate_code: ""
