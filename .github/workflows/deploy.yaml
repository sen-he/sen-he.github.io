name: Deploy Astro site to GitHub Pages

# NOTE: this is the redesign-astro version of the deploy workflow. It builds the
# Astro project in ./site and publishes ./site/dist to GitHub Pages. It replaces
# the previous Hugo workflow on cutover (when this branch merges to master).
# Triggers on master pushes and manual dispatch, so it does not run on the
# redesign-astro branch itself.

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          path: ./site # the Astro project lives in a subdirectory

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
