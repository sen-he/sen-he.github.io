name: Deploy Astro site to GitHub Pages

# Builds the Astro project in ./site and publishes ./site/dist to GitHub Pages.
# Triggers on pushes to master and manual dispatch. Action versions are kept on
# their latest majors (Node 24 runtime) to avoid Node 20 deprecation warnings.

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build Astro site
        uses: withastro/action@v6
        with:
          path: ./site # the Astro project lives in a subdirectory

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
